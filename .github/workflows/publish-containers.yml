name: Publish containers

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      build_nginx:
        description: "Build and publish the Nginx image"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate Composer metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

  publish-php:
    name: Publish PHP image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: echo "PHP_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/bidbuzz-php" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract PHP image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PHP_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php-fpm/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=bidbuzz-php
          cache-to: type=gha,mode=max,scope=bidbuzz-php

  publish-nginx:
    name: Publish Nginx image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check manual Nginx build request
        id: changes
        shell: bash
        run: |
          should_build=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_nginx }}" == "true" ]]; then
            should_build=true
          fi

          echo "should_build=${should_build}" >> "$GITHUB_OUTPUT"

      - name: Prepare image name
        if: steps.changes.outputs.should_build == 'true'
        run: echo "NGINX_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/bidbuzz-nginx" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Nginx image metadata
        if: steps.changes.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NGINX_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and publish Nginx image
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=bidbuzz-nginx
          cache-to: type=gha,mode=max,scope=bidbuzz-nginx
