services:
  web:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    restart: unless-stopped
    volumes:
      - bidbuzz-storage:/var/www/storage:ro
      - bidbuzz-public-assets:/var/www/public/build:ro
    networks:
      - bidbuzz
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      php-fpm:
        condition: service_healthy

  php-fpm: &php-app
    build:
      context: .
      dockerfile: ./docker/php-fpm/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - bidbuzz-storage:/var/www/storage
      - bidbuzz-public-assets:/var/www/public/build
    env_file:
      - path: .env
        required: false
    networks:
      bidbuzz:
        aliases:
          - bidbuzz-php
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    <<: *php-app
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "database", "--sleep=3", "--tries=3", "--timeout=90"]
    healthcheck:
      disable: true
    profiles:
      - worker

  migrate:
    <<: *php-app
    restart: "no"
    command: ["php", "artisan", "migrate", "--force"]
    healthcheck:
      disable: true
    profiles:
      - tools

networks:
  bidbuzz:

volumes:
  bidbuzz-storage:
  bidbuzz-public-assets:
